<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Lisp заявка в Bitrix24</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #user-info {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            z-index: 200;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            pointer-events: none;
        }
        #form-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 380px;
            background: rgba(30, 30, 40, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 100;
            max-height: 90vh;
            overflow-y: auto;
            pointer-events: auto;
            }
        #form-container h2 {
            margin-top: 0;
            text-align: center;
            color: #ffd966;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            border-bottom: 1px solid #555;
            padding-bottom: 10px;
        }
        .field-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #ccc;
            font-size: 0.9rem;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid #555;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #ffd966;
            background: rgba(255,255,255,0.15);
        }
        input[readonly] {
            background: rgba(80,80,90,0.5);
            color: #aaa;
            cursor: not-allowed;
        }
        select option {
            background: #333;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #5c9ded;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 10px;
        }
        button:hover {
            background: #4a8cd4;
        }
        button:active {
            transform: scale(0.98);
        }
        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            display: none;
        }
        .success {
            background: rgba(40, 167, 69, 0.7);
            border: 1px solid #28a745;
        }
        .error {
            background: rgba(220, 53, 69, 0.7);
            border: 1px solid #dc3545;
        }
        .info-note {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 5px;
        }
        #three-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        /* Адаптация для мобильных */
        @media (max-width: 600px) {
            #form-container {
                width: 90%;
                left: 5%;
                top: 10px;
                padding: 15px;
            }
        }
    </style>
    <script src="//api.bitrix24.com/api/v1/"></script>
    <script src="https://cdn.jsdelivr.net/npm/three-js@79.0.0/three.min.js"></script>
</head>
<body>
    <div id="user-info">Загрузка...</div>
    <div id="form-container">
        <h2>📋 Новая заявка</h2>
        <div class="field-group">
            <label>Ваше имя</label>
            <input type="text" id="user-name" readonly placeholder="Загружается...">
        </div>
        <div class="field-group">
            <label>Телефон</label>
            <input type="text" id="user-phone" readonly placeholder="Загружается...">
        </div>
        <div class="field-group">
            <label>Email</label>
            <input type="email" id="user-email" readonly placeholder="Загружается...">
        </div>
        <div class="field-group">
            <label>Категория заявки</label>
            <select id="request-category">
                <option value="orgtech">🖨️ Оргтехника</option>
                <option value="software">💻 ПО</option>
                <option value="computers">🖥️ Компьютеры</option>
                <option value="network">🌐 Сетевые работы</option>
                <option value="meters">📊 Счётчики</option>
                <option value="providers">📡 Провайдеры</option>
                <option value="cameras">📹 Камеры</option>
                <option value="mobile">📱 Сотовая связь/покрытие</option>
            </select>
            <div class="info-note">Подробности категории см. в описании</div>
        </div>
        <div class="field-group">
            <label>Тема заявки</label>
            <input type="text" id="request-title" placeholder="Кратко опишите суть">
        </div>
        <div class="field-group">
            <label>Описание проблемы (подробно)</label>
            <textarea id="request-description" rows="4" placeholder="Опишите детали..."></textarea>
        </div>
        <button id="submit-btn">🚀 Отправить заявку</button>
        <div id="status-message" class="status"></div>
    </div>

    <canvas id="three-canvas"></canvas>

    <script>
        (function() {
            // --- Bitrix24: получение данных пользователя и инициализация ---
            let currentUser = null;
            const userNameField = document.getElementById('user-name');
            const userPhoneField = document.getElementById('user-phone');
            const userEmailField = document.getElementById('user-email');
            const userInfoDiv = document.getElementById('user-info');
            const statusDiv = document.getElementById('status-message');
            const submitBtn = document.getElementById('submit-btn');

            function showStatus(text, isSuccess) {
                statusDiv.textContent = text;
                statusDiv.className = 'status ' + (isSuccess ? 'success' : 'error');
                statusDiv.style.display = 'block';
                setTimeout(() => {
                    statusDiv.style.display = 'none';
                }, 5000);
            }

            if (typeof BX24 !== 'undefined' && BX24) {
                console.log('BX24 найдена, инициализируем...');
                BX24.init(function() {
                    console.log('✅ BX24 инициализирована!');
                    BX24.installFinish();

                    BX24.callMethod('user.current', {}, function(result) {
                        if (result.error()) {
                            console.error('Ошибка API:', result.error());
                            userInfoDiv.textContent = 'Не удалось загрузить данные';
                            userNameField.value = 'Ошибка загрузки';
                            userPhoneField.value = 'Ошибка';
                            userEmailField.value = 'Ошибка';
                        } else {
                            currentUser = result.data();
                            console.log('Пользователь:', currentUser);

                            const name = currentUser.NAME || '';
                            const lastName = currentUser.LAST_NAME || '';
                            const fullName = (name + ' ' + lastName).trim() || 'Без имени';
                            const phone = currentUser.PERSONAL_PHONE || currentUser.WORK_PHONE || 'не указан';
                            const email = currentUser.EMAIL || 'не указан';

                            userInfoDiv.textContent = `Привет, ${fullName}!`;
                            userNameField.value = fullName;
                            userPhoneField.value = phone;
                            userEmailField.value = email;
                        }
                    });
                });
            } else {
                console.error('❌ Библиотека BX24 не загружена. Приложение должно работать внутри iframe на портале Битрикс24.');
                userInfoDiv.textContent = 'Ошибка: не в iframe Битрикс24';
                userNameField.value = 'недоступно';
                userPhoneField.value = 'недоступно';
                userEmailField.value = 'недоступно';
            }

            // --- Обработка отправки формы ---
            submitBtn.addEventListener('click', function() {
                if (!currentUser) {
                    showStatus('Данные пользователя ещё не загружены', false);
                    return;
                }

                const categorySelect = document.getElementById('request-category');
                const categoryText = categorySelect.options[categorySelect.selectedIndex].text;
                const title = document.getElementById('request-title').value.trim();
                const description = document.getElementById('request-description').value.trim();

                if (!title || !description) {
                        showStatus('Заполните тему и описание', false);
                    return;
                }

    // Данные для отправки на свой сервер
                const payload = {
                    title: title,
                    description: description,
                    category: categoryText,
                    userName: document.getElementById('user-name').value,
                    userPhone: document.getElementById('user-phone').value,
                    userEmail: document.getElementById('user-email').value
                };

    // Адрес твоего сервера (например, тот же, где крутится Hunchentoot)
                const serverUrl = '/create-task';  // или полный URL типа 'http://localhost:12200/create-task'

                fetch(serverUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                })
                .then(response => response.json())
                .then(data => {
                if (data.error) {
                    showStatus('Ошибка сервера: ' + data.error, false);
                } else {
                            showStatus('✅ Заявка успешно отправлена!', true);
                            document.getElementById('request-title').value = '';
                            document.getElementById('request-description').value = '';
                        }
                })
                .catch(error => showStatus('Ошибка сети: ' + error.message, false));




                // const categorySelect = document.getElementById('request-category');
                // const categoryText = categorySelect.options[categorySelect.selectedIndex].text;
                // const title = document.getElementById('request-title').value.trim();
                // const description = document.getElementById('request-description').value.trim();

                // if (!title || !description) {
                //     showStatus('Заполните тему и описание', false);
                //     return;
                // }

                // // Формируем полное описание с категорией
                // const fullDescription = `[${categoryText}]\n${description}`;

                // // Параметры задачи (RESPONSIBLE_ID можно заменить на нужного сотрудника, например, текущего)
                // const taskFields = {
                //     TITLE: title,
                //     DESCRIPTION: fullDescription,
                //     RESPONSIBLE_ID: currentUser.ID,          // ответственный - текущий пользователь (можно изменить)
                //     CREATED_BY: currentUser.ID,
                //     // Можно добавить DEADLINE, PRIORITY, GROUP_ID и т.д. по необходимости
                // };

                // // Отправляем через BX24
                // BX24.callMethod('tasks.task.add', { fields: taskFields }, function(result) {
                //     if (result.error()) {
                //         console.error('Ошибка создания задачи:', result.error());
                //         showStatus('Ошибка: ' + result.error().ex, false);
                //     } else {
                //         console.log('Задача создана:', result.data());
                //         showStatus('✅ Заявка успешно отправлена!', true);
                //         // Очистить поля
                //         document.getElementById('request-title').value = '';
                //         document.getElementById('request-description').value = '';
                //     }
                // });
            });

            // --- Three.js: переливающийся куб с символом Lisp ---
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three-canvas'), alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 0); // прозрачный фон

            // Создаём канвас с прозрачным фоном и белым текстом (символ λ и LISP)
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Текст "λ" (лямбда) – символ Lisp
            ctx.font = 'bold 400px "Courier New", monospace';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('λ', canvas.width/2, canvas.height/2 - 120);
            
            // Текст "LISP"
            ctx.font = 'bold 200px "Courier New", monospace';
            ctx.fillText('LISP', canvas.width/2, canvas.height/2 + 200);

            const texture = new THREE.CanvasTexture(canvas);
            
            const material = new THREE.MeshBasicMaterial({ 
                map: texture,
                transparent: true,
                side: THREE.DoubleSide
            });
            
            const geometry = new THREE.BoxGeometry(1.8, 1.8, 1.8);
            const cube = new THREE.Mesh(geometry, material);
            scene.add(cube);

            let time = 0;

            function animate() {
                requestAnimationFrame(animate);
                
                time += 0.01;
                
                const hue = time % 1;
                cube.material.color.setHSL(hue, 1, 0.7);
                
                cube.rotation.x += 0.005;
                cube.rotation.y += 0.01;
                
                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', onWindowResize, false);
            function onWindowResize() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        })();
    </script>
</body>
</html>

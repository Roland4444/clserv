<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Lisp заявка в Bitrix24 (Three.js)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #user-info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
            z-index: 100;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* Стили для CSS2D-элементов */
        .ui-panel {
            background: #1a237e; /* тёмно-синий */
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #4a148c; /* тёмно-фиолетовый */
            width: 380px;
            max-width: 90vw;
            box-sizing: border-box;
            pointer-events: auto;
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .ui-panel h2 {
            margin-top: 0;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: 600;
        }
        .ui-panel label {
            display: block;
            margin: 10px 0 5px;
            font-weight: 600;
            color: #ccc;
            text-align: left;
        }
        .ui-panel input, .ui-panel textarea, .ui-panel select {
            width: 100%;
            padding: 10px;
            background: #311b92; /* тёмно-фиолетовый */
            border: 1px solid #795548; /* коричневый */
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            margin-bottom: 10px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .ui-panel input:focus, .ui-panel textarea:focus, .ui-panel select:focus {
            outline: none;
            border-color: #b71c1c; /* красный */
            background: #4a148c;
        }
        .ui-panel button {
            padding: 10px 20px;
            background: #b71c1c; /* красный */
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            transition: background 0.2s;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .ui-panel button:hover {
            background: #8e0000;
        }
        .ui-panel button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        /* Стили для плиток категорий */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }
        .category-tile {
            background: #311b92; /* тёмно-фиолетовый */
            border: 1px solid #795548; /* коричневый */
            border-radius: 12px;
            padding: 15px 5px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .category-tile:hover {
            background: #4a148c;
            border-color: #b71c1c; /* красный */
        }
        .category-tile.selected {
            background: #b71c1c; /* красный */
            border-color: #ffd966;
        }
        .category-desc {
            text-align: left;
            font-size: 0.9rem;
            background: #311b92;
            padding: 15px;
            border-radius: 12px;
            margin: 15px 0;
            border: 1px solid #795548;
            white-space: pre-wrap;
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .file-info {
            font-size: 0.9rem;
            color: #aaa;
            margin-top: 5px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .status-message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            background: rgba(40, 167, 69, 0.7);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
    <script src="//api.bitrix24.com/api/v1/"></script>
    <!-- Используем стабильную версию three.js r128 -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>
</head>
<body>
    <div id="user-info">Загрузка...</div>

    <!-- <script src="static/index.js">    </script> -->

    <script src="static/nothree.js">    </script>


      
</body>
</html>

<VirtualHost *:8080>
    ServerName romach.space
    DocumentRoot /var/www/html/glpi
    SetEnvIf X-Forwarded-User "^(.*)$" REMOTE_USER=$1
    <Directory /var/www/html/glpi/>
        AllowOverride All
        Require all granted
    </Directory>
#emacs comm
    ErrorLog ${APACHE_LOG_DIR}/glpi_error.log
    CustomLog ${APACHE_LOG_DIR}/glpi_access.log combined


LogFormat "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\" \"%{REMOTE_USER}i\"" custom
CustomLog /var/log/apache2/access.log custom

LogFormat "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\" \"%{X-Forwarded-User}i\"" forwarded
CustomLog /var/log/apache2/access.log forwarded
</VirtualHost>
